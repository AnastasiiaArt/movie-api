# --- DataSource ---
spring.datasource.url=jdbc:sqlite:movies.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# --- Hibernate ---
# Указываем диалект Hibernate для SQLite (из hibernate-community-dialects)
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# Автоматическое управление схемой базы данных:
# Возможные значения: none, validate, update, create, create-drop
spring.jpa.hibernate.ddl-auto=update

# --- JPA / Hibernate Logging (опционально) ---
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
